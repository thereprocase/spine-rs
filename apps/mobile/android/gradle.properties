# JVM heap for the Gradle daemon. 2G is enough for a single-module app;
# bump if the Kotlin compiler starts OOMing once more dependencies land.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Parallel and caching defaults. Safe for a single-module project.
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configuration-cache=true

# AndroidX is mandatory for Compose + modern Android libraries.
android.useAndroidX=true

# Kotlin code style — kept at official so lint matches community norms.
kotlin.code.style=official

# Non-transitive R classes keep build times lower and avoid accidental
# cross-module resource leaks. Single-module today but future-proofs cheap.
android.nonTransitiveRClass=true
